services:
  postgres:
    image: postgres:16
    container_name: feriados-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feriados
    ports:
      - "5432:5432"
    volumes:
      - feriados-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feriados"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  feriados-postgres-data:
